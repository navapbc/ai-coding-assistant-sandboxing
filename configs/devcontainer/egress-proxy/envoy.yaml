# Envoy egress gateway — explicit HTTP CONNECT forward proxy with a host allowlist.
#
# ⚠️ EXPERIMENTAL / UNTESTED IN CI. Reviewed reference for the opt-in CONNECT
# egress mode (see ./README.md). The `@type` strings, the CONNECT/
# dynamic_forward_proxy wiring, and especially vhost `domains` matching of the
# CONNECT authority (host vs host:443, and wildcard+port behavior) are
# Envoy-version-sensitive — VALIDATE on a real build (see README "Validate
# before relying"). If the Envoy matching is fiddly, README has a ~6-line Squid
# equivalent that does the same CONNECT allowlist more simply.
#
# Model: clients reach the network ONLY through this proxy
# (HTTP(S)_PROXY=127.0.0.1:15001 + iptables default-deny except Envoy's own
# egress). For HTTPS the client sends `CONNECT host:443` in CLEARTEXT; only
# CONNECT authorities on the allowlist are tunnelled (via dynamic_forward_proxy),
# everything else gets 403.
#
# Why this beats the transparent-SNI design on ECH: the destination is the
# cleartext CONNECT host, so the (possibly ECH-encrypted) inner SNI is never
# needed. It still does NOT defeat domain fronting — the inner Host can differ
# on a shared CDN; only TLS termination (Docker Sandboxes) catches that.

admin:
  address: { socket_address: { address: 127.0.0.1, port_value: 15000 } }

static_resources:
  listeners:
  - name: connect_proxy
    address: { socket_address: { address: 127.0.0.1, port_value: 15001 } }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: egress_connect
          upgrade_configs:
          - upgrade_type: CONNECT     # accept CONNECT tunnels
          route_config:
            name: egress
            virtual_hosts:
            - name: allowed
              # A CONNECT request's :authority is "host:port". Only these are
              # tunnelled. Regenerated from allowed-domains.txt (with :443
              # appended) by init-egress-proxy.sh — do not hand-edit.
              domains:
                # @@CONNECT_AUTHORITIES@@  (init-egress-proxy.sh replaces this line)
                - "example.invalid:443"
              routes:
              - match: { connect_matcher: {} }
                route:
                  cluster: dynamic_forward_proxy
                  upgrade_configs:
                  - upgrade_type: CONNECT
                    connect_config: {}
            - name: deny_all
              domains: ["*"]
              routes:
              - match: { connect_matcher: {} }
                direct_response: { status: 403 }
          http_filters:
          - name: envoy.filters.http.dynamic_forward_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
              dns_cache_config:
                name: egress_dns_cache
                dns_lookup_family: V4_PREFERRED
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: dynamic_forward_proxy
    lb_policy: CLUSTER_PROVIDED
    connect_timeout: 5s
    cluster_type:
      name: envoy.clusters.dynamic_forward_proxy
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
        dns_cache_config:
          name: egress_dns_cache
          dns_lookup_family: V4_PREFERRED
